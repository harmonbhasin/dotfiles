model = "gpt-5.5"
model_reasoning_effort = "low"
personality = "pragmatic"
service_tier = "fast"
web_search = "live"
plan_mode_reasoning_effort="xhigh"

[features]
shell_snapshot = true
hooks = true

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--browserUrl", "http://127.0.0.1:9222"]

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[mcp_servers.wandb]
url = "https://mcp.withwandb.com/mcp"
bearer_token_env_var = "WANDB_API_KEY"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "run-state", "context-used", "fast-mode", "thread-title", "task-progress"]
vim_mode_default = true

tui.vim_mode_default = true

[agents]
max_threads = 10
max_depth = 2

[projects."/home/ubuntu/gpu-setup"]
trust_level = "trusted"

[projects."/home/ubuntu/cbrn-classifiers"]
trust_level = "trusted"

[projects."/home/ubuntu"]
trust_level = "trusted"

[projects."/root"]
trust_level = "trusted"
