model = "gpt-5.5"
model_reasoning_effort = "high"
personality = "pragmatic"
service_tier = "fast"
web_search = "live"
plan_mode_reasoning_effort="xhigh"

[features]
shell_snapshot = true
hooks = true

[mcp_servers.chrome-devtools]
command = "npx"
args = [
    "-y",
    "chrome-devtools-mcp@latest",
    "--browserUrl",
    "http://127.0.0.1:9222"
]
enabled = true

[mcp_servers.chrome-devtools.tools.take_snapshot]
approval_mode = "approve"

[tui]
status_line = ["model-with-reasoning", "current-dir", "git-branch", "context-used", "session-id", "fast-mode", "thread-title", "task-progress"]

[tui.model_availability_nux]
"gpt-5.5" = 4

[agents]
max_threads = 10
max_depth = 2
